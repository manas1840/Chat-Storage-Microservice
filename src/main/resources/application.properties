# =============================================
# Application
# =============================================
spring.application.name=rag-chat-service
server.port=${SERVER_PORT:8080}

# =============================================
# H2 Database
# =============================================
spring.datasource.url=jdbc:h2:mem:ragchatdb;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE
spring.datasource.driver-class-name=org.h2.Driver
spring.datasource.username=${DB_USERNAME:sa}
spring.datasource.password=${DB_PASSWORD:}
spring.jpa.database-platform=org.hibernate.dialect.H2Dialect
spring.jpa.hibernate.ddl-auto=create-drop
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=true

# H2 Console (useful for development)
spring.h2.console.enabled=true
spring.h2.console.path=/h2-console

# =============================================
# Basic Authentication Credentials
# =============================================
app.security.username=${APP_USERNAME:admin}
app.security.password=${APP_PASSWORD:admin123}

# =============================================
# Rate Limiting
# =============================================
app.rate-limit.capacity=${RATE_LIMIT_CAPACITY:100}
app.rate-limit.refill-tokens=${RATE_LIMIT_REFILL_TOKENS:100}
app.rate-limit.refill-duration-seconds=${RATE_LIMIT_REFILL_SECONDS:60}

# =============================================
# CORS
# =============================================
app.cors.allowed-origins=${CORS_ALLOWED_ORIGINS:http://localhost:3000,http://localhost:4200}
app.cors.allowed-methods=GET,POST,PUT,PATCH,DELETE,OPTIONS
app.cors.allowed-headers=*
app.cors.max-age=3600

# =============================================
# Pagination Defaults
# =============================================
app.pagination.default-page-size=${DEFAULT_PAGE_SIZE:20}
app.pagination.max-page-size=${MAX_PAGE_SIZE:100}

# =============================================
# Actuator / Health
# =============================================
management.endpoints.web.exposure.include=health,info,metrics
management.endpoint.health.show-details=always
management.info.env.enabled=true
info.app.name=RAG Chat Storage Microservice
info.app.version=1.0.0

# =============================================
# Logging
# =============================================
logging.level.root=INFO
logging.level.com.ragchat=DEBUG
logging.pattern.console=%d{yyyy-MM-dd HH:mm:ss} [%thread] %-5level %logger{36} - %msg%n
logging.pattern.file=%d{yyyy-MM-dd HH:mm:ss} [%thread] %-5level %logger{36} - %msg%n
logging.file.name=${LOG_FILE:logs/rag-chat-service.log}

# =============================================
# SpringDoc / Swagger
# =============================================
springdoc.api-docs.path=/api-docs
springdoc.swagger-ui.path=/swagger-ui.html
springdoc.swagger-ui.operationsSorter=method
